<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar - ATUALIZADO V2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #020b1c;
            --bg-card: rgba(255,255,255,0.05);
            --cyan: #00d4ff;
            --cyan-dark: #0099cc;
            --cyan-light: #5ffbf1;
            --green: #00ff88;
            --red: #ff4d4d;
            --white: #ffffff;
            --text-dim: rgba(255,255,255,0.6);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Oswald', sans-serif;
            background: var(--bg-dark);
            background-image:
                linear-gradient(rgba(2,11,28,0.95), rgba(2,11,28,0.92)),
                url('assets/background.png');
            background-size: cover;
            background-attachment: fixed;
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Marca d'agua - Logo Central de Servidores */
        body::after {
            content: "";
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image: url('assets/logo-central-v2.png');
            background-repeat: repeat;
            background-size: 300px;
            opacity: 0.15;
            z-index: 9999;
            pointer-events: none;
            transform: rotate(-30deg);
        }

        /* ===== NAVBAR ===== */
        .navbar {
            position: fixed; top:0; left:0; width:100%; height:70px;
            display:flex; justify-content:space-between; align-items:center;
            padding: 0 30px;
            background: rgba(2,11,28,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }
        .nav-title {
            font-family: 'Anton', sans-serif;
            font-size: 1.5rem;
            color: var(--cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex; align-items: center; gap: 12px;
        }
        .nav-title i { font-size: 1.3rem; }
        .nav-links {
            display: flex; gap: 20px; list-style: none;
        }
        .nav-links a {
            text-decoration: none; color: var(--white);
            font-size: 0.95rem; font-weight: 500;
            text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s; display: flex; align-items: center; gap: 6px;
        }
        .nav-links a:hover { color: var(--cyan); transform: translateY(-2px); }

        /* ===== MAIN LAYOUT ===== */
        .main-container {
            margin-top: 70px;
            display: flex;
            height: calc(100vh - 70px);
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: rgba(0,0,0,0.3);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-header h3 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 10px;
        }
        .sidebar-search {
            width: 100%;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.08);
            color: white;
            font-family: 'Oswald', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
        }
        .sidebar-search:focus {
            border-color: var(--cyan);
            background: rgba(0,0,0,0.4);
            box-shadow: 0 0 10px rgba(0,212,255,0.2);
        }
        .sidebar-search::placeholder { color: rgba(255,255,255,0.4); }

        .server-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .server-list::-webkit-scrollbar { width: 4px; }
        .server-list::-webkit-scrollbar-track { background: transparent; }
        .server-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        .server-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
            border: 1px solid transparent;
        }
        .server-item:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.1);
        }
        .server-item.active {
            background: rgba(0,212,255,0.15);
            border-color: var(--cyan);
            box-shadow: 0 0 15px rgba(0,212,255,0.15);
        }
        .server-item img {
            width: 40px; height: 40px;
            object-fit: contain;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
        }
        .server-item-info {
            flex: 1;
            min-width: 0;
        }
        .server-item-name {
            font-weight: 500;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .server-item-count {
            font-size: 0.75rem;
            color: var(--text-dim);
        }
        .server-item-count span {
            color: var(--cyan);
            font-weight: 700;
        }

        /* ===== CONTENT AREA ===== */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }
        .content::-webkit-scrollbar { width: 6px; }
        .content::-webkit-scrollbar-track { background: transparent; }
        .content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        .content-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .content-header img {
            width: 80px; height: 80px;
            object-fit: contain;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.15);
            padding: 5px;
        }
        .content-header-text h1 {
            font-family: 'Anton', sans-serif;
            font-size: 2rem;
            letter-spacing: 2px;
        }
        .content-header-text p {
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        /* ===== SECTIONS ===== */
        .section {
            margin-bottom: 35px;
        }
        .section-title {
            font-family: 'Anton', sans-serif;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title i { color: var(--cyan); }
        .section-title .count-badge {
            background: var(--cyan);
            color: var(--bg-dark);
            font-size: 0.75rem;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 700;
            font-family: 'Oswald', sans-serif;
        }

        /* ===== PARTNER GRID ===== */
        .partners-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .partner-card {
            position: relative;
            width: 120px;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 12px 8px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .partner-card:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .partner-card img {
            width: 70px; height: 70px;
            object-fit: contain;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            padding: 4px;
        }
        .partner-card .partner-name {
            font-size: 0.7rem;
            text-align: center;
            font-weight: 500;
            text-transform: uppercase;
            color: rgba(255,255,255,0.8);
            line-height: 1.2;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Remove button */
        .partner-card .remove-btn {
            position: absolute;
            top: -6px; right: -6px;
            width: 24px; height: 24px;
            border-radius: 50%;
            background: var(--red);
            color: white;
            border: 2px solid var(--bg-dark);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem;
            cursor: pointer;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.2s;
            z-index: 5;
        }
        .partner-card:hover .remove-btn {
            opacity: 1;
            transform: scale(1);
        }
        .partner-card .remove-btn:hover {
            background: #ff0000;
            transform: scale(1.2);
        }

        /* Add button overlay */
        .partner-card.add-card {
            border-style: dashed;
            border-color: rgba(255,255,255,0.2);
        }
        .partner-card.add-card:hover {
            border-color: var(--green);
            background: rgba(0,255,136,0.05);
        }
        .partner-card.add-card .add-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,255,136,0.1);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
            transition: all 0.3s;
        }
        .partner-card.add-card:hover .add-overlay {
            opacity: 1;
        }
        .partner-card.add-card .add-overlay i {
            font-size: 2rem;
            color: var(--green);
            text-shadow: 0 0 15px rgba(0,255,136,0.5);
        }

        /* Already added indicator */
        .partner-card.already-added {
            opacity: 0.3;
            pointer-events: none;
        }
        .partner-card.already-added::after {
            content: '✓';
            position: absolute;
            top: 5px; right: 8px;
            color: var(--green);
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* ===== SAVE BAR ===== */
        .save-bar {
            position: fixed;
            bottom: -80px;
            left: 280px;
            right: 0;
            height: 70px;
            background: rgba(2,11,28,0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0,255,136,0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 999;
            box-shadow: 0 -5px 30px rgba(0,0,0,0.5);
        }
        .save-bar.visible {
            bottom: 0;
        }
        .save-bar .changes-text {
            color: var(--text-dim);
            font-size: 0.95rem;
        }
        .save-bar .changes-text span {
            color: #ffaa00;
            font-weight: 700;
        }
        .save-bar .save-actions {
            display: flex; gap: 12px;
        }
        .btn {
            padding: 10px 25px;
            border-radius: 8px;
            border: none;
            font-family: 'Oswald', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-cancel {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-cancel:hover { background: rgba(255,77,77,0.2); border-color: var(--red); }
        .btn-save {
            background: linear-gradient(135deg, #00cc6a, #00ff88);
            color: #003d1f;
            box-shadow: 0 4px 15px rgba(0,255,136,0.3);
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0,255,136,0.4);
        }
        .btn-save:active { transform: translateY(0); }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            top: 80px; right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            z-index: 2000;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; gap: 10px;
        }
        .toast.visible { transform: translateX(0); }
        .toast.success {
            background: rgba(0,255,136,0.15);
            border: 1px solid var(--green);
            color: var(--green);
        }
        .toast.error {
            background: rgba(255,77,77,0.15);
            border: 1px solid var(--red);
            color: var(--red);
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-dim);
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.3;
        }
        .empty-state p { font-size: 1rem; }

        /* ===== DIVIDER ===== */
        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            margin: 10px 0 25px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .sidebar { width: 220px; min-width: 220px; }
            .save-bar { left: 220px; }
            .partner-card { width: 100px; }
            .partner-card img { width: 55px; height: 55px; }
        }

        /* ===== SELECT PROMPT ===== */
        .select-prompt {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 20px;
            color: var(--text-dim);
        }
        .select-prompt i {
            font-size: 5rem;
            opacity: 0.15;
            color: var(--cyan);
        }
        .select-prompt p {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ===== ADD BUTTONS ===== */
        .btn-add-new {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px dashed rgba(0,255,136,0.4);
            background: rgba(0,255,136,0.08);
            color: var(--green);
            font-family: 'Oswald', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-add-new:hover {
            background: rgba(0,255,136,0.15);
            border-color: var(--green);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(0,255,136,0.15);
        }
        .btn-add-new i { font-size: 0.9rem; }

        .btn-add-inline {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border-radius: 6px;
            border: 1px dashed rgba(0,255,136,0.4);
            background: rgba(0,255,136,0.08);
            color: var(--green);
            font-family: 'Oswald', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            margin-left: auto;
        }
        .btn-add-inline:hover {
            background: rgba(0,255,136,0.15);
            border-color: var(--green);
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .modal-overlay.visible {
            display: flex;
        }
        .modal {
            background: #0a1628;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 30px;
            width: 480px;
            max-width: 90vw;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            animation: modalSlideIn 0.3s ease;
        }
        @keyframes modalSlideIn {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-title {
            font-family: 'Anton', sans-serif;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--cyan);
            margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px;
        }
        .modal-close {
            margin-left: auto;
            width: 32px; height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: none;
            color: rgba(255,255,255,0.6);
            font-size: 1rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .modal-close:hover { background: rgba(255,77,77,0.3); color: var(--red); }

        .form-group {
            margin-bottom: 18px;
        }
        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.08);
            color: white;
            font-family: 'Oswald', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }
        .form-input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 10px rgba(0,212,255,0.2);
        }
        .form-input::placeholder { color: rgba(255,255,255,0.3); }

        .upload-zone {
            width: 100%;
            height: 140px;
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .upload-zone:hover {
            border-color: var(--cyan);
            background: rgba(0,212,255,0.05);
        }
        .upload-zone.has-image {
            border-color: var(--green);
            background: rgba(0,255,136,0.05);
        }
        .upload-zone i { font-size: 2rem; color: var(--text-dim); }
        .upload-zone span { font-size: 0.85rem; color: var(--text-dim); }
        .upload-zone img {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: contain;
            padding: 10px;
        }
        .upload-zone input[type=file] {
            position: absolute;
            width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .color-row {
            display: flex; gap: 10px;
        }
        .color-row .form-group { flex: 1; }
        .color-input-wrap {
            display: flex; align-items: center; gap: 8px;
        }
        .color-input-wrap input[type=color] {
            width: 40px; height: 36px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
        }
        .color-input-wrap .form-input {
            flex: 1;
        }

        .modal-actions {
            display: flex; gap: 12px; margin-top: 25px;
        }
        .modal-actions .btn { flex: 1; justify-content: center; }

        /* ===== CORES SECTION ===== */
        .colors-row {
            display: flex; gap: 15px; flex-wrap: wrap;
        }
        .color-group {
            flex: 1; min-width: 140px;
        }
        .color-group label {
            display: block; font-size: 0.8rem; font-weight: 500;
            text-transform: uppercase; letter-spacing: 1px;
            color: var(--text-dim); margin-bottom: 6px;
        }
        .color-group .color-wrap {
            display: flex; align-items: center; gap: 8px;
        }
        .color-group input[type=color] {
            width: 40px; height: 36px; border: none;
            border-radius: 6px; cursor: pointer; background: transparent;
        }
        .color-group .hex-input {
            flex: 1; padding: 8px 10px; border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.08); color: white;
            font-family: 'Oswald', sans-serif; font-size: 0.85rem;
            outline: none; transition: all 0.3s;
        }
        .color-group .hex-input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 8px rgba(0,212,255,0.2);
        }
        .color-preview {
            height: 6px; border-radius: 3px; margin-top: 15px;
            transition: all 0.3s;
        }

        /* ===== CONTENT STATS ===== */
        .content-stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 4px;
        }
        @media (max-width: 1100px) {
            .content-stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: all 0.3s;
        }
        .stat-card:focus-within {
            border-color: var(--cyan);
            background: rgba(0,212,255,0.06);
            box-shadow: 0 0 12px rgba(0,212,255,0.15);
        }
        .stat-card-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
        }
        .stat-card-label i { color: var(--cyan); font-size: 0.85rem; }
        .stat-card-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            color: white;
            font-family: 'Oswald', sans-serif;
            font-size: 1.4rem;
            font-weight: 600;
            outline: none;
            padding-bottom: 4px;
            transition: border-color 0.3s;
        }
        .stat-card-input:focus {
            border-bottom-color: var(--cyan);

        .stat-card-input::placeholder { color: rgba(255,255,255,0.2); font-size: 1rem; }
        .stat-card.date-card .stat-card-input {
            font-size: 0.9rem;
        }

        /* ===== PRICE TABLE ===== */
        .price-table {
            width: 100%; border-collapse: separate;
            border-spacing: 0 4px;
        }
        .price-table th {
            text-align: left; padding: 8px 12px;

        .price-table td {

        }
        .price-table .row-input {
            width: 100%; padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06); color: white;
            font-family: 'Oswald', sans-serif; font-size: 0.9rem;
            outline: none; transition: all 0.3s;
        }
        .price-table .row-input:focus {
            border-color: var(--cyan);
            background: rgba(0,212,255,0.05);
        }
        .price-table .delete-row {
            width: 30px; height: 30px; border-radius: 6px;
            background: rgba(255,77,77,0.15); border: 1px solid rgba(255,77,77,0.3);
            color: var(--red); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; transition: all 0.2s;

        .price-table .delete-row:hover {

            transform: scale(1.1);

            font-size: 0.85rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: all 0.3s;

        .btn-add-row:hover {
            background: rgba(0,255,136,0.12);
            border-color: var(--green);

</head>
<body>

        </div>

        </ul>

    <!-- Main Layout -->

        <!-- Sidebar: Server List -->
        <div class="sidebar">
            <div class="sidebar-header">

                <input type="text" class="sidebar-search" placeholder="Buscar servidor..." id="sidebarSearch">
                <button class="btn-add-new" onclick="openModal('server')">
                    <i class="fas fa-plus"></i> Novo Servidor
                </button>
            </div>
            <div class="server-list" id="serverList">

            </div>

        <!-- Content: Partner Management -->
        <div class="content" id="contentArea">
            <div class="select-prompt">
                <i class="fas fa-arrow-left"></i>

    </div>

    <!-- Save Bar (hidden by default) -->

        <div class="changes-text">

            Você tem <span id="changesCount">0</span> alteração(ões) não salvas
        </div>
        <div class="save-actions">
            <button class="btn btn-cancel" onclick="cancelChanges()">
                <i class="fas fa-times"></i> Cancelar
            </button>
            <button class="btn btn-save" onclick="saveChanges()">
                <i class="fas fa-save"></i> Salvar Alterações
            </button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <!-- MODAL: Novo App Parceiro -->
    <div class="modal-overlay" id="modalPartner">
        <div class="modal">
            <div class="modal-title">
                <i class="fas fa-mobile-alt"></i>
                Novo App Parceiro
                <button class="modal-close" onclick="closeModal('partner')"><i class="fas fa-times"></i></button>
            </div>
            <div class="form-group">
                <label class="form-label">Nome do App</label>
                <input type="text" class="form-input" id="newPartnerName" placeholder="Ex: MEGA PLAYER">
            </div>
            <div class="form-group">
                <label class="form-label">Logo do App</label>
                <div class="upload-zone" id="partnerUploadZone">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>Clique ou arraste a imagem aqui</span>
                    <input type="file" accept="image/*" onchange="handleUpload(this, 'partner')">
                </div>

            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal('partner')">

    <!-- MODAL: Novo Servidor -->
    <div class="modal-overlay" id="modalServer">
        <div class="modal">
            <div class="modal-title">
                <i class="fas fa-server"></i>
                Novo Servidor
                <button class="modal-close" onclick="closeModal('server')"><i class="fas fa-times"></i></button>
            </div>
            <div class="form-group">
                <label class="form-label">Nome do Servidor</label>
                <input type="text" class="form-input" id="newServerName" placeholder="Ex: MEGA TV">
            </div>
            <div class="form-group">
                <label class="form-label">Logo do Servidor</label>
                <div class="upload-zone" id="serverUploadZone">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>Clique ou arraste a imagem aqui</span>
                    <input type="file" accept="image/*" onchange="handleUpload(this, 'server')">
                </div>
            </div>
            <div class="color-row">
                <div class="form-group">
                    <label class="form-label">Cor Principal</label>
                    <div class="color-input-wrap">
                        <input type="color" id="colorMain" value="#00d4ff" onchange="document.getElementById('colorMainHex').value=this.value">
                        <input type="text" class="form-input" id="colorMainHex" value="#00d4ff" onchange="document.getElementById('colorMain').value=this.value">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Cor Escura</label>
                    <div class="color-input-wrap">
                        <input type="color" id="colorDark" value="#0099cc" onchange="document.getElementById('colorDarkHex').value=this.value">
                        <input type="text" class="form-input" id="colorDarkHex" value="#0099cc" onchange="document.getElementById('colorDark').value=this.value">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Cor Clara</label>
                    <div class="color-input-wrap">
                        <input type="color" id="colorLight" value="#5ffbf1" onchange="document.getElementById('colorLightHex').value=this.value">
                        <input type="text" class="form-input" id="colorLightHex" value="#5ffbf1" onchange="document.getElementById('colorLight').value=this.value">
                    </div>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal('server')">
                    <i class="fas fa-times"></i> Cancelar
                </button>
                <button class="btn btn-save" onclick="createNewServer()">
                    <i class="fas fa-plus"></i> Criar Servidor
                </button>
            </div>
        </div>
    </div>

    <script>
        // ===== ALL AVAILABLE PARTNER LOGOS =====
        // Agora carregado dinamicamente via API
        let allPartners = {};

        async function loadPartnerLogos() {
            try {
                const res = await fetch('http://localhost:9090/api/logos');
                if(res.ok) {
                    const files = await res.json();
                    allPartners = {};
                    // Mapear todos os arquivos: nome SEM extensão em UPPERCASE => nome do arquivo original
                    files.forEach(f => {
                        let name = f.replace(/\.[^/.]+$/, "").toUpperCase().trim();
                        allPartners[name] = f;
                    });
                    console.log('[LOGOS] Carregados:', Object.keys(allPartners).length, 'logos de parceiros');
                    if (selectedServerId) {
                        renderContent(servers[selectedServerId]);
                    }
                } else {
                    console.warn('[LOGOS] API retornou status:', res.status);
                }
            } catch (e) {
                console.error('[LOGOS] Falha ao carregar logos via API:', e);
            }
        }

        let selectedServerId = null;
        let pendingChanges = 0;
        let originalPartners = {};

        // ===== POPULATE SERVER LIST =====
        function populateServerList(filter = '') {
            const list = document.getElementById('serverList');
            list.innerHTML = '';

            const sorted = Object.keys(servers)
                .map(id => ({ id, ...servers[id] }))
                .sort((a, b) => a.name.localeCompare(b.name));

            const filtered = filter
                ? sorted.filter(s => s.name.toLowerCase().includes(filter.toLowerCase()))
                : sorted;

            filtered.forEach(server => {
                const item = document.createElement('div');
                item.className = 'server-item' + (selectedServerId === server.id ? ' active' : '');
                item.dataset.id = server.id;
                item.onclick = () => selectServer(server.id);

                const partnerCount = server.partners ? server.partners.length : 0;

                item.innerHTML = `
                    <img src="${server.logo}" alt="${server.name}" onerror="this.src='assets/server/Logo Servidores/NEW ONE.png'">
                    <div class="server-item-info">
                        <div class="server-item-name">${server.name}</div>
                        <div class="server-item-count"><span>${partnerCount}</span> parceiros</div>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        // ===== SELECT SERVER =====
        function selectServer(serverId) {
            if (pendingChanges > 0) {
                if (!confirm('Você tem alterações não salvas. Deseja descartar?')) return;
                cancelChanges();
            }

            selectedServerId = serverId;
            const server = servers[serverId];

            // Save original state
            originalPartners[serverId] = server.partners ? [...server.partners] : [];

            // Update sidebar active state
            document.querySelectorAll('.server-item').forEach(item => {
                item.classList.toggle('active', item.dataset.id === serverId);
            });

            renderContent(server);
        }

        // ===== RENDER CONTENT =====
        function renderContent(server) {
            const content = document.getElementById('contentArea');
            const currentPartners = server.partners || [];
            const partnerCount = currentPartners.length;
            const ranges = server.ranges || [];
            const prices = server.prices || [];

            // Build price table rows
            let priceRows = '';
            for (let i = 0; i < Math.max(ranges.length, prices.length); i++) {
                priceRows += `
                    <tr>
                        <td><input type="text" class="row-input range-input" value="${ranges[i] || ''}" data-index="${i}" oninput="markPriceChanged()"></td>
                        <td><input type="text" class="row-input price-input" value="${prices[i] || ''}" data-index="${i}" oninput="markPriceChanged()"></td>
                        <td><button class="delete-row" onclick="deletePriceRow(${i})" title="Remover faixa"><i class="fas fa-times"></i></button></td>
                    </tr>
                `;
            }

            content.innerHTML = `
                <!-- Header -->
                <div class="content-header">
                    <img src="${server.logo}" alt="${server.name}" onerror="this.src='assets/server/Logo Servidores/NEW ONE.png'">
                    <div class="content-header-text">
                        <h1 style="display:flex; align-items:center; gap: 10px;">
                            <span id="displayServerName">${server.name}</span>
                            <button class="btn" style="padding:5px 10px; font-size:0.8rem; background:rgba(255,255,255,0.1); border:none; color:#fff;" onclick="editServerName('${selectedServerId}')" title="Editar Nome do Servidor">
                                <i class="fas fa-pencil-alt"></i>
                            </button>
                        </h1>
                        <p>Gerenciar servidor completo</p>
                    </div>
                    <button class="btn btn-delete" style="margin-left:auto; background:rgba(255,77,77,0.15); border:1px solid rgba(255,77,77,0.3); color:var(--red); font-size: 0.9rem;" onclick="confirmDeleteServer('${selectedServerId}', '${server.name.replace(/'/g, "\\\\'")}')">
                        <i class="fas fa-trash-alt"></i> Excluir Servidor
                    </button>
                </div>

                <!-- Content Counts Section -->
                <div class="section">
                    <div class="section-title">
                        <i class="fas fa-database"></i>
                        Quantidade de Conteúdos
                    </div>
                    <div class="content-stats-grid">
                        <div class="stat-card">
                            <div class="stat-card-label"><i class="fas fa-tv"></i> Canais</div>
                            <input type="text" class="stat-card-input" id="editChannels" value="${server.channels_count || ''}" placeholder="Ex: 1.500" oninput="markPriceChanged()">
                        </div>
                        <div class="stat-card">
                            <div class="stat-card-label"><i class="fas fa-film"></i> Filmes</div>
                            <input type="text" class="stat-card-input" id="editMovies" value="${server.movies_count || ''}" placeholder="Ex: 25.000" oninput="markPriceChanged()">
                        </div>
                        <div class="stat-card">
                            <div class="stat-card-label"><i class="fas fa-video"></i> Séries</div>
                            <input type="text" class="stat-card-input" id="editSeries" value="${server.series_count || ''}" placeholder="Ex: 8.000" oninput="markPriceChanged()">
                        </div>
                        <div class="stat-card date-card">
                            <div class="stat-card-label"><i class="fas fa-clock"></i> Atualizado em</div>
                            <input type="text" class="stat-card-input" id="editLastUpdated" value="${server.last_updated || ''}" placeholder="dd/mm/aaaa às hh:mm" oninput="markPriceChanged()">
                        </div>
                    </div>
                </div>

                <div class="divider"></div>

                <!-- Colors Section -->
                <div class="section">
                    <div class="section-title">
                        <i class="fas fa-palette"></i>
                        Cores do Servidor
                    </div>
                    <div class="colors-row">
                        <div class="color-group">
                            <label>Cor Principal</label>
                            <div class="color-wrap">
                                <input type="color" id="editColorMain" value="${server.colorMain || '#00d4ff'}" onchange="document.getElementById('editColorMainHex').value=this.value; updateColorPreview(); markPriceChanged();">
                                <input type="text" class="hex-input" id="editColorMainHex" value="${server.colorMain || '#00d4ff'}" onchange="document.getElementById('editColorMain').value=this.value; updateColorPreview(); markPriceChanged();">
                            </div>
                        </div>
                        <div class="color-group">
                            <label>Cor Escura</label>
                            <div class="color-wrap">
                                <input type="color" id="editColorDark" value="${server.colorDark || '#0099cc'}" onchange="document.getElementById('editColorDarkHex').value=this.value; updateColorPreview(); markPriceChanged();">
                                <input type="text" class="hex-input" id="editColorDarkHex" value="${server.colorDark || '#0099cc'}" onchange="document.getElementById('editColorDark').value=this.value; updateColorPreview(); markPriceChanged();">
                            </div>
                        </div>
                        <div class="color-group">
                            <label>Cor Clara</label>
                            <div class="color-wrap">
                                <input type="color" id="editColorLight" value="${server.colorLight || '#5ffbf1'}" onchange="document.getElementById('editColorLightHex').value=this.value; updateColorPreview(); markPriceChanged();">
                                <input type="text" class="hex-input" id="editColorLightHex" value="${server.colorLight || '#5ffbf1'}" onchange="document.getElementById('editColorLight').value=this.value; updateColorPreview(); markPriceChanged();">
                            </div>
                        </div>
                    </div>
                    <div class="color-preview" id="colorPreview" style="background: linear-gradient(90deg, ${server.colorDark || '#0099cc'}, ${server.colorMain || '#00d4ff'}, ${server.colorLight || '#5ffbf1'});"></div>
                </div>

                <div class="divider"></div>

                <!-- Price Table Section -->
                <div class="section">
                    <div class="section-title">
                        <i class="fas fa-tags"></i>
                        Tabela de Preços
                        <span class="count-badge">${ranges.length || 0}</span>
                    </div>
                    ${ranges.length > 0 || prices.length > 0 ? `
                    <table class="price-table">
                        <thead>
                            <tr>
                                <th>Faixa de Créditos</th>
                                <th>Preço (R$)</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="priceTableBody">
                            ${priceRows}
                        </tbody>
                    </table>
                    ` : `
                    <div class="empty-state">
                        <i class="fas fa-table"></i>
                        <p>Nenhuma faixa de preço cadastrada</p>
                    </div>
                    `}
                    <button class="btn-add-row" onclick="addPriceRow()">
                        <i class="fas fa-plus"></i> Adicionar Faixa
                    </button>
                </div>

                <div class="divider"></div>

                <!-- Current Partners -->
                <div class="section">
                    <div class="section-title">
                        <i class="fas fa-check-circle"></i>
                        Parceiros Atuais
                        <span class="count-badge" id="currentCount">${partnerCount}</span>
                    </div>
                    <div class="partners-grid" id="currentPartnersGrid">
                        ${partnerCount === 0 ? `
                            <div class="empty-state">
                                <i class="fas fa-users-slash"></i>
                                <p>Nenhum parceiro cadastrado</p>
                            </div>
                        ` : ''}
                    </div>
                </div>

                <div class="divider"></div>

                <!-- Available Partners -->
                <div class="section">
                    <div class="section-title">
                        <i class="fas fa-plus-circle"></i>
                        Adicionar Parceiro
                        <span class="count-badge" id="availableCount">0</span>
                        <input type="text" id="partnerSearch" placeholder="🔍 Buscar..." oninput="filterAvailablePartners()" style="margin-left:auto; padding:6px 12px; border-radius:6px; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.08); color:white; font-family:'Oswald',sans-serif; font-size:0.8rem; outline:none; width:180px; transition:all 0.3s;">
                        <button class="btn-add-inline" onclick="openModal('partner')">
                            <i class="fas fa-plus"></i> Novo App
                        </button>
                    </div>
                    <div class="partners-grid" id="availablePartnersGrid"></div>
                </div>
            `;

            renderCurrentPartners(currentPartners);
            renderAvailablePartners(currentPartners);
        }

        // ===== RENDER CURRENT PARTNERS =====
        function renderCurrentPartners(partners) {
            const grid = document.getElementById('currentPartnersGrid');
            if (!grid) return;

            if (partners.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-users-slash"></i>
                        <p>Nenhum parceiro cadastrado</p>
                    </div>
                `;
                document.getElementById('currentCount').textContent = '0';
                return;
            }

            grid.innerHTML = '';
            document.getElementById('currentCount').textContent = partners.length;

            partners.forEach(name => {
                const filename = allPartners[name] || `${name}.png`;
                const card = document.createElement('div');
                card.className = 'partner-card';
                card.innerHTML = `
                    <div class="remove-btn" onclick="removePartner('${name.replace(/'/g, "\\'")}'); event.stopPropagation();">
                        <i class="fas fa-times"></i>
                    </div>
                    <img src="assets/logos/${filename}?v=1" alt="${name}"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div style="display:none; width:70px; height:70px; background:rgba(255,255,255,0.1); border-radius:10px; align-items:center; justify-content:center; font-size:0.6rem; text-align:center; padding:5px; color:rgba(255,255,255,0.5);">${name}</div>
                    <div class="partner-name">${name}</div>
                `;
                grid.appendChild(card);
            });
        }

        // ===== RENDER AVAILABLE PARTNERS =====
        function renderAvailablePartners(currentPartners, searchFilter = '') {
            const grid = document.getElementById('availablePartnersGrid');
            if (!grid) return;

            grid.innerHTML = '';

            let available = Object.keys(allPartners)
                .filter(name => !currentPartners.includes(name))
                .sort();

            if (searchFilter) {
                available = available.filter(name =>
                    name.toLowerCase().includes(searchFilter.toLowerCase())
                );
            }

            document.getElementById('availableCount').textContent = available.length;

            available.forEach(name => {
                const filename = allPartners[name];
                const card = document.createElement('div');
                card.className = 'partner-card add-card';
                card.onclick = () => addPartner(name);
                card.innerHTML = `
                    <div class="add-overlay"><i class="fas fa-plus"></i></div>
                    <img src="assets/logos/${filename}?v=1" alt="${name}"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div style="display:none; width:70px; height:70px; background:rgba(255,255,255,0.1); border-radius:10px; align-items:center; justify-content:center; font-size:0.6rem; text-align:center; padding:5px; color:rgba(255,255,255,0.5);">${name}</div>
                    <div class="partner-name">${name}</div>
                `;
                grid.appendChild(card);
            });
        }

        // ===== FILTRAR PARCEIROS DISPONÍVEIS =====
        function filterAvailablePartners() {
            if (!selectedServerId) return;
            const search = document.getElementById('partnerSearch').value;
            const currentPartners = servers[selectedServerId].partners || [];
            renderAvailablePartners(currentPartners, search);
        }

        // ===== COLOR PREVIEW =====
        function updateColorPreview() {
            const main = document.getElementById('editColorMainHex').value;
            const dark = document.getElementById('editColorDarkHex').value;
            const light = document.getElementById('editColorLightHex').value;
            const preview = document.getElementById('colorPreview');
            if (preview) {
                preview.style.background = `linear-gradient(90deg, ${dark}, ${main}, ${light})`;
            }
        }

        // ===== MARK PRICE/COLOR CHANGED =====
        function markPriceChanged() {
            // Just flag changes so save picks them up
            if (!selectedServerId) return;
            trackChange();
        }

        // ===== COLLECT COLOR & PRICE DATA BEFORE SAVE =====
        function collectServerEdits() {
            if (!selectedServerId) return;
            const server = servers[selectedServerId];

            // Collect colors
            const mainEl = document.getElementById('editColorMainHex');
            const darkEl = document.getElementById('editColorDarkHex');
            const lightEl = document.getElementById('editColorLightHex');
            if (mainEl) server.colorMain = mainEl.value;
            if (darkEl) server.colorDark = darkEl.value;
            if (lightEl) server.colorLight = lightEl.value;

            // Collect content counts
            const chEl = document.getElementById('editChannels');
            const mvEl = document.getElementById('editMovies');
            const srEl = document.getElementById('editSeries');
            const luEl = document.getElementById('editLastUpdated');
            if (chEl) server.channels_count = chEl.value.trim();
            if (mvEl) server.movies_count = mvEl.value.trim();
            if (srEl) server.series_count = srEl.value.trim();
            if (luEl) server.last_updated = luEl.value.trim();

            // Collect ranges and prices
            const rangeInputs = document.querySelectorAll('.range-input');
            const priceInputs = document.querySelectorAll('.price-input');
            if (rangeInputs.length > 0 || priceInputs.length > 0) {
                const newRanges = [];
                const newPrices = [];
                rangeInputs.forEach(input => {
                    if (input.value.trim()) newRanges.push(input.value.trim());
                });
                priceInputs.forEach(input => {
                    if (input.value.trim()) newPrices.push(input.value.trim());
                });
                server.ranges = newRanges;
                server.prices = newPrices;
            }
        }

        // ===== ADD PRICE ROW =====
        function addPriceRow() {
            if (!selectedServerId) return;
            const server = servers[selectedServerId];
            if (!server.ranges) server.ranges = [];
            if (!server.prices) server.prices = [];

            // First collect current inputs
            collectServerEdits();

            server.ranges.push('');
            server.prices.push('');
            trackChange();
            renderContent(server);

            // Focus on the new range input
            setTimeout(() => {
                const inputs = document.querySelectorAll('.range-input');
                if (inputs.length > 0) inputs[inputs.length - 1].focus();
            }, 100);
        }

        // ===== DELETE PRICE ROW =====
        function deletePriceRow(index) {
            if (!selectedServerId) return;
            const server = servers[selectedServerId];

            // Collect current inputs first
            collectServerEdits();

            if (server.ranges) server.ranges.splice(index, 1);
            if (server.prices) server.prices.splice(index, 1);

            trackChange();
            renderContent(server);
            showToast('🗑️ Faixa removida', 'error');
        }

        // ===== ADD PARTNER =====
        function addPartner(name) {
            if (!selectedServerId) return;

            const server = servers[selectedServerId];
            if (!server.partners) server.partners = [];
            if (server.partners.includes(name)) return;

            server.partners.push(name);
            server.partners.sort();
            trackChange();
            renderContent(server);
            showToast(`✅ ${name} adicionado!`, 'success');
        }

        // ===== REMOVE PARTNER =====
        function removePartner(name) {
            if (!selectedServerId) return;

            const server = servers[selectedServerId];
            if (!server.partners) return;

            server.partners = server.partners.filter(p => p !== name);
            trackChange();
            renderContent(server);
            populateServerList(document.getElementById('sidebarSearch').value);
            showToast(`❌ ${name} removido`, 'error');
        }

        // ===== TRACK CHANGES =====
        function trackChange() {
            pendingChanges++;
            document.getElementById('changesCount').textContent = pendingChanges;
            document.getElementById('saveBar').classList.add('visible');
        }

        // ===== UPDATE SAVE BAR =====
        function updateSaveBar() {
            document.getElementById('changesCount').textContent = pendingChanges;
            if (pendingChanges > 0) {
                document.getElementById('saveBar').classList.add('visible');
            } else {
                document.getElementById('saveBar').classList.remove('visible');
            }
        }

        // ===== CANCEL CHANGES =====
        function cancelChanges() {
            if (selectedServerId && originalPartners[selectedServerId]) {
                servers[selectedServerId].partners = [...originalPartners[selectedServerId]];
                renderContent(servers[selectedServerId]);
            }
            pendingChanges = 0;
            document.getElementById('saveBar').classList.remove('visible');
            populateServerList(document.getElementById('sidebarSearch').value);
        }

        // ===== SAVE CHANGES =====
        async function saveChanges() {
            const btn = document.querySelector('.btn-save');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';
            btn.disabled = true;

            // Collect color and price edits before saving
            collectServerEdits();

            try {
                const response = await fetch('http://localhost:9090/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(servers)
                });

                const result = await response.json();

                if (result.status === 'success') {
                    showToast('✅ Alterações salvas com sucesso!', 'success');
                    pendingChanges = 0;
                    document.getElementById('saveBar').classList.remove('visible');
                    // Update original state
                    if (selectedServerId) {
                        originalPartners[selectedServerId] = servers[selectedServerId].partners
                            ? [...servers[selectedServerId].partners] : [];
                    }
                    populateServerList(document.getElementById('sidebarSearch').value);
                } else {
                    showToast('❌ Erro ao salvar: ' + (result.error || 'Desconhecido'), 'error');
                }
            } catch (e) {
                showToast('❌ Erro de conexão. Reinicie o servidor.', 'error');
                console.error(e);
            } finally {
                btn.innerHTML = '<i class="fas fa-save"></i> Salvar Alterações';
                btn.disabled = false;
            }
        }

        // ===== TOAST =====
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type + ' visible';
            setTimeout(() => toast.classList.remove('visible'), 3000);
        }

        // ===== SEARCH =====
        document.getElementById('sidebarSearch').addEventListener('input', function() {
            populateServerList(this.value);
        });

        // ===== MODAL FUNCTIONS =====
        let uploadedPartnerImage = null;
        let uploadedServerImage = null;

        function openModal(type) {
            if (type === 'partner') {
                document.getElementById('modalPartner').classList.add('visible');
                document.getElementById('newPartnerName').value = '';
                resetUploadZone('partner');
            } else {
                document.getElementById('modalServer').classList.add('visible');
                document.getElementById('newServerName').value = '';
                resetUploadZone('server');
            }
        }

        function closeModal(type) {
            if (type === 'partner') {
                document.getElementById('modalPartner').classList.remove('visible');
                uploadedPartnerImage = null;
            } else {
                document.getElementById('modalServer').classList.remove('visible');
                uploadedServerImage = null;
            }
        }

        function resetUploadZone(type) {
            const zone = document.getElementById(type === 'partner' ? 'partnerUploadZone' : 'serverUploadZone');
            zone.classList.remove('has-image');
            const existingImg = zone.querySelector('img');
            if (existingImg) existingImg.remove();
            zone.querySelector('i').style.display = '';
            zone.querySelector('span').style.display = '';
            if (type === 'partner') uploadedPartnerImage = null;
            else uploadedServerImage = null;
        }

        function handleUpload(input, type) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const zone = input.parentElement;
                zone.classList.add('has-image');
                zone.querySelector('i').style.display = 'none';
                zone.querySelector('span').style.display = 'none';

                let img = zone.querySelector('img');
                if (!img) {
                    img = document.createElement('img');
                    zone.appendChild(img);
                }
                img.src = e.target.result;

                if (type === 'partner') {
                    uploadedPartnerImage = { data: e.target.result, name: file.name };
                } else {
                    uploadedServerImage = { data: e.target.result, name: file.name };
                }
            };
            reader.readAsDataURL(file);
        }

        // ===== CREATE NEW PARTNER =====
        async function createNewPartner() {
            const name = document.getElementById('newPartnerName').value.trim();
            if (!name) {
                showToast('❌ Digite o nome do app parceiro', 'error');
                return;
            }
            if (allPartners[name]) {
                showToast('❌ Esse parceiro já existe!', 'error');
                return;
            }
            if (!uploadedPartnerImage) {
                showToast('❌ Selecione a logo do parceiro', 'error');
                return;
            }

            // Determine filename
            const ext = uploadedPartnerImage.name.split('.').pop().toLowerCase();
            const filename = `${name}.${ext}`;

            try {
                // Upload logo
                const uploadRes = await fetch('http://localhost:9090/upload-logo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type: 'partner',
                        filename: filename,
                        imageData: uploadedPartnerImage.data
                    })
                });
                const uploadResult = await uploadRes.json();

                if (uploadResult.status !== 'success') {
                    throw new Error(uploadResult.error || 'Erro no upload');
                }

                // Add to allPartners mapping
                allPartners[name] = filename;

                closeModal('partner');
                showToast(`✅ ${name} criado com sucesso!`, 'success');

                // Re-render if a server is selected
                if (selectedServerId) {
                    renderContent(servers[selectedServerId]);
                }

            } catch (e) {
                showToast('❌ Erro: ' + e.message, 'error');
                console.error(e);
            }
        }

        // ===== CREATE NEW SERVER =====
        async function createNewServer() {
            const name = document.getElementById('newServerName').value.trim();
            if (!name) {
                showToast('❌ Digite o nome do servidor', 'error');
                return;
            }

            // Generate ID from name
            const id = name.toLowerCase().replace(/[^a-z0-9]/g, '');
            if (servers[id]) {
                showToast('❌ Esse servidor já existe!', 'error');
                return;
            }

            const colorMain = document.getElementById('colorMainHex').value || '#00d4ff';
            const colorDark = document.getElementById('colorDarkHex').value || '#0099cc';
            const colorLight = document.getElementById('colorLightHex').value || '#5ffbf1';

            // Determine logo path
            let logoPath = `assets/server/Logo Servidores/${name}.png`;

            if (uploadedServerImage) {
                const ext = uploadedServerImage.name.split('.').pop().toLowerCase();
                const filename = `${name}.${ext}`;
                logoPath = `assets/server/Logo Servidores/${filename}`;

                try {
                    const uploadRes = await fetch('http://localhost:9090/upload-logo', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            type: 'server',
                            filename: filename,
                            imageData: uploadedServerImage.data
                        })
                    });
                    const uploadResult = await uploadRes.json();
                    if (uploadResult.status !== 'success') {
                        throw new Error(uploadResult.error || 'Erro no upload');
                    }
                } catch (e) {
                    showToast('❌ Erro no upload: ' + e.message, 'error');
                    return;
                }
            }

            // Create server entry
            servers[id] = {
                name: name,
                logo: logoPath,
                colorMain: colorMain,
                colorDark: colorDark,
                colorLight: colorLight,
                channels_count: '1',
                movies_count: '1',
                series_count: '1',
                last_updated: (() => {
                    const n = new Date();
                    const d = String(n.getDate()).padStart(2,'0');
                    const m = String(n.getMonth()+1).padStart(2,'0');
                    const y = n.getFullYear();
                    const h = String(n.getHours()).padStart(2,'0');
                    const mi = String(n.getMinutes()).padStart(2,'0');
                    return `${d}/${m}/${y} às ${h}:${mi}`;
                })(),
                partners: []
            };

            // Save immediately
            try {
                const response = await fetch('http://localhost:9090/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(servers)
                });
                const result = await response.json();

                if (result.status === 'success') {
                    closeModal('server');
                    showToast(`✅ Servidor ${name} criado!`, 'success');
                    populateServerList();
                } else {
                    throw new Error(result.error);
                }
            } catch (e) {
                showToast('❌ Erro ao salvar: ' + e.message, 'error');
            }
        }

        // ===== DELETE SERVER =====
        async function confirmDeleteServer(serverId, serverName) {
            const firstConfirm = confirm(\`🛑 AVISO: Você está prestes a excluir o servidor "${serverName}".\\n\\nEsta ação apagará todas as configurações de cores, preços e parceiros atrelados a ele.\\n\\nDeseja realmente continuar?\`);
            if (!firstConfirm) return;

            const secondConfirm = confirm(\`⚠️ ÚLTIMA CHANCE: Tem certeza ABSOLUTA que deseja excluir o servidor "${serverName}" permanentemente?\`);
            if (!secondConfirm) return;

            // Remove from servers object
            delete servers[serverId];
            selectedServerId = null;
            pendingChanges = 0;
            updateSaveBar();

            // Clear content area
            const content = document.getElementById('contentArea');
            content.innerHTML = \`<div class="select-prompt">
                <i class="fas fa-arrow-left"></i>
                <p>Selecione um servidor na lista</p>
            </div>\`;

            // Save immediately
            try {
                const response = await fetch('http://localhost:9090/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(servers)
                });
                const result = await response.json();

                if (result.status === 'success') {
                    showToast(\`🗑️ Servidor ${serverName} excluído!\`, 'success');
                    populateServerList();
                } else {
                    throw new Error(result.error);
                }
            } catch (e) {
                showToast('❌ Erro ao excluir: ' + e.message, 'error');
                setTimeout(() => location.reload(), 2000);
            }
        }

        // ===== EDIT SERVER NAME =====
        function editServerName(serverId) {
            const server = servers[serverId];
            if(!server) return;
            const newName = prompt("Digite o novo nome do servidor:", server.name);
            if(newName !== null && newName.trim() !== '') {
                server.name = newName.trim();
                document.getElementById('displayServerName').textContent = server.name;
                populateServerList();
                markPriceChanged(); 
            }
        }

        // Close modal on overlay click
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('visible');
                }
            });
        });

        // ===== INIT =====
        // servers_data.js e carregado no head antes de qualquer script inline,
        // entao 'servers' ja esta definido aqui
        if (typeof servers !== 'undefined' && Object.keys(servers).length > 0) {
            populateServerList();
        } else {
            console.error('[INIT] servers_data.js nao carregou! Verifique o servidor Python em localhost:9090');
        }
        loadPartnerLogos();



    </script>
</body>
</html>
